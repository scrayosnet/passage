syntax = "proto3";

package scrayosnet.passage.adapter;

message Target {
    string identifier = 1;
    Address address = 2;
    repeated MetaEntry meta = 3;
    uint32 priority = 4;
}

message Address {
    string hostname = 1;
    uint32 port = 2;
}

message MetaEntry {
    string key = 1;
    string value = 2;
}

message Profile {
    string id = 1;
    string name = 2;
    repeated ProfileProperty properties = 3;
    repeated string profile_actions = 4;
}

message ProfileProperty {
    string name = 1;
    string value = 2;
    optional string signature = 3;
}

message ClientInfo {
    Address client_address = 1;
    Address server_address = 2;
    uint64 protocol_version = 3;
}

message PlayerInfo {
    string name = 1;
    string id = 2;
}
