# Default values for passage.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/scrayosnet/passage
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the port for the Minecraft protocol.
  port: 25565
  # Annotations to add to the service (e.g. cloud load balancer annotations).
  annotations: {}

resources:
  requests:
    cpu: 10m
    memory: 50Mi
  limits:
    cpu: 100m
    memory: 50Mi

# Deployment update strategy.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  tcpSocket:
    port: minecraft
  periodSeconds: 1
  timeoutSeconds: 1
  failureThreshold: 5

livenessProbe:
  tcpSocket:
    port: minecraft
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 2

readinessProbe:
  tcpSocket:
    port: minecraft
  periodSeconds: 5
  timeoutSeconds: 1
  failureThreshold: 1

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Environment variables passed to the Passage container.
env:
  RUST_LOG: "info"

# Additional environment variable sources loaded from ConfigMaps or Secrets.
extraEnvFrom: []
  # - secretRef:
  #     name: passage-env

# Passage application configuration, mounted read-only as /config/config.yaml.
# Set to a non-empty object to enable the ConfigMap and volume mount.
config: {}
  # proxyProtocol:
  #   enabled: true
  # routes:
  #   - hostPattern: ".*"
  #     ...

# RBAC configuration for Agones GameServer integration.
rbac:
  agones:
    # Enable ClusterRole and RoleBinding for Agones GameServer discovery and allocation.
    enabled: false
    # Namespace where Agones GameServers are deployed. Required when enabled is true.
    gameserverNamespace: ""

# Topology spread constraints for distributing pods across nodes.
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels: {}

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}
